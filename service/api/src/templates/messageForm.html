<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar/Crear Mensaje</title>
    <link rel="stylesheet" href="/statics/css/styles.css">
    <style>
        .form-container {
            max-width: 400px;
            margin: 2rem auto;
            background: var(--color-card-bg);
            border-radius: 8px;
            box-shadow: var(--color-card-shadow);
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-card-meta-label);
            font-weight: 600;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: var(--color-bg-main);
            color: var(--color-text-main);
            font-size: 1rem;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header__container">
            <h1 class="header__title">⚡ Relay</h1>
        </div>
    </header>
    <main class="container">
        <div class="form-container">
            <h2 id="form-title">Crear Mensaje</h2>
            <form id="message-form">
                <div class="form-group">
                    <label class="form-label" for="recipient">Para (teléfono):</label>
                    <input class="form-input" type="text" id="recipient" name="recipient" required maxlength="50">
                </div>
                <div class="form-group">
                    <label class="form-label" for="payload">Mensaje:</label>
                    <textarea class="form-textarea" id="payload" name="payload" required maxlength="500"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn--success">Guardar</button>
                    <a href="/" id="cancel-btn" class="btn btn--secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <script type="module" src="/statics/js/messageForm.js"></script>
</body>

</html>
