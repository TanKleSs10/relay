services:
  api:
    build:
      context: ./service/backend
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./service/backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - relay-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - relay-network

  wa-engine:
    build:
      context: ./service/workers/whatsapp
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      - NO_SANDBOX=1
    command: npm run dev
    volumes:
      - ./service/workers/whatsapp:/app
      - /app/node_modules
      - whatsapp_auth:/app/.wwebjs_auth
    depends_on:
      - db
    networks:
      - relay-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./service/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - relay-network

volumes:
  postgres_data:
  whatsapp_auth:

networks:
  relay-network:
