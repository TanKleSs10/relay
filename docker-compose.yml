services:
  api:
    build:
      context: ./service/backend
      dockerfile: Dockerfile.api
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - relay-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - relay-network

  wa-engine:
    build:
      context: ./service/workers/whatsapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NO_SANDBOX=1
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
    depends_on:
      - db
    networks:
      - relay-network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./service/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - relay-network

volumes:
  postgres_data:
  whatsapp_auth:

networks:
  relay-network:
