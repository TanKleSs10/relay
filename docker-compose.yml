services:
  api:
    build:
      context: ./service/backend
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./service/backend:/app
    depends_on:
      - db
    networks:
      - relay-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - relay-network

  whatsapp-worker:
    build:
      context: ./service/workers/whatsapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NO_SANDBOX=1
    volumes:
      - ./service/workers/whatsapp:/app
      - /app/node_modules
      - whatsapp_auth:/app/.wwebjs_auth
    depends_on:
      - db
    networks:
      - relay-network

  frontend:
    build:
      context: ./service/frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
    volumes:
      - ./service/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - relay-network

volumes:
  postgres_data:
  whatsapp_auth:

networks:
  relay-network:
